version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: backend-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: job_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init_database.sql:/docker-entrypoint-initdb.d/init_database.sql
    networks:
      - backend-network
    restart: always

  neo4j:
    image: neo4j:5
    container_name: backend-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4JLABS_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    networks:
      - backend-network
    restart: always

  backend:
    build: .
    container_name: career-backend
    ports:
      - "5000:5000"
    depends_on:
      - mysql
      - neo4j
    networks:
      - backend-network
    restart: always
    environment:
      - FLASK_APP=api.py
      - FLASK_ENV=development

  frontend:
    image: nginx:latest
    container_name: career-frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./static:/usr/share/nginx/html
    depends_on:
      - backend
    networks:
      - backend-network
    restart: always

volumes:
  mysql_data:
  neo4j_data:

networks:
  backend-network:
    driver: bridge